<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050f2e"/>
      <stop offset="50%" stop-color="#0a1f4d"/>
      <stop offset="100%" stop-color="#1c3578"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd60a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd60a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bannerBg)"/>
  <circle cx="200" cy="80" r="180" fill="url(#glow1)"/>
  <circle cx="1000" cy="200" r="200" fill="url(#glow2)"/>
  <circle cx="600" cy="40" r="150" fill="url(#glow3)"/>

  <!-- Decorative dotted grid -->
  <g fill="#ffd60a" opacity="0.15">
    <circle cx="80" cy="40" r="2"/>
    <circle cx="120" cy="40" r="2"/>
    <circle cx="160" cy="40" r="2"/>
    <circle cx="80" cy="80" r="2"/>
    <circle cx="120" cy="80" r="2"/>
    <circle cx="160" cy="80" r="2"/>
    <circle cx="1080" cy="220" r="2"/>
    <circle cx="1120" cy="220" r="2"/>
    <circle cx="1080" cy="240" r="2"/>
    <circle cx="1120" cy="240" r="2"/>
  </g>

  <!-- Atom (left side) -->
  <g transform="translate(140, 140)" opacity="0.75">
    <ellipse cx="0" cy="0" rx="55" ry="22" fill="none" stroke="#ffd60a" stroke-width="2.5" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="55" ry="22" fill="none" stroke="#22d3ee" stroke-width="2.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="55" ry="22" fill="none" stroke="#ec4899" stroke-width="2.5" transform="rotate(120)"/>
    <circle cx="0" cy="0" r="8" fill="#ffd60a"/>
    <circle cx="55" cy="0" r="4" fill="#ffd60a"/>
    <circle cx="-27.5" cy="-47.5" r="4" fill="#22d3ee"/>
    <circle cx="-27.5" cy="47.5" r="4" fill="#ec4899"/>
  </g>

  <!-- Beaker (right side) -->
  <g transform="translate(1020, 100)" opacity="0.8">
    <path d="M -22,0 L -22,-30 L -28,-30 L -28,-36 L 28,-36 L 28,-30 L 22,-30 L 22,0 L 38,40 L -38,40 Z"
          fill="none" stroke="#ffd60a" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M -28,15 L 28,15 L 35,32 L -35,32 Z" fill="#22d3ee" opacity="0.55"/>
    <circle cx="-8" cy="22" r="2.5" fill="#ffd60a"/>
    <circle cx="6" cy="18" r="2" fill="#ffd60a"/>
    <circle cx="14" cy="26" r="2.5" fill="#ffd60a"/>
    <circle cx="-15" cy="8" r="1.5" fill="#fff" opacity="0.7"/>
    <circle cx="0" cy="0" r="1.5" fill="#fff" opacity="0.7"/>
  </g>

  <!-- DNA helix (right) -->
  <g transform="translate(1100, 180)" opacity="0.6" stroke="#ec4899" stroke-width="2" fill="none">
    <path d="M -25,-40 Q 0,-25 25,-40 Q 0,-55 -25,-40" />
    <path d="M -25,-15 Q 0,0 25,-15 Q 0,-30 -25,-15" />
    <path d="M -25,10 Q 0,25 25,10 Q 0,-5 -25,10" />
    <path d="M -25,35 Q 0,50 25,35 Q 0,20 -25,35" />
  </g>

  <!-- Gear (left bottom) -->
  <g transform="translate(70, 220)" opacity="0.55">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="9" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
    <g stroke="#22d3ee" stroke-width="6" stroke-linecap="round">
      <line x1="0" y1="-26" x2="0" y2="-32"/>
      <line x1="0" y1="26" x2="0" y2="32"/>
      <line x1="-26" y1="0" x2="-32" y2="0"/>
      <line x1="26" y1="0" x2="32" y2="0"/>
      <line x1="-18" y1="-18" x2="-22" y2="-22"/>
      <line x1="18" y1="-18" x2="22" y2="-22"/>
      <line x1="-18" y1="18" x2="-22" y2="22"/>
      <line x1="18" y1="18" x2="22" y2="22"/>
    </g>
  </g>

  <!-- Text -->
  <g text-anchor="middle">
    <text x="600" y="100" font-family="'Fraunces', Georgia, serif" font-size="28" font-weight="600"
          fill="#ffd60a" letter-spacing="6">★ FALLON ★</text>
    <text x="600" y="170" font-family="'Fraunces', Georgia, serif" font-size="64" font-weight="900"
          fill="#ffffff" letter-spacing="-1">SCIENCE OLYMPIAD</text>
    <text x="600" y="210" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="500"
          fill="#22d3ee" letter-spacing="8">BUILD · STUDY · COMPETE</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="275" width="1200" height="5" fill="url(#bannerBg)"/>
  <g>
    <rect x="0" y="275" width="400" height="5" fill="#ffd60a"/>
    <rect x="400" y="275" width="400" height="5" fill="#ec4899"/>
    <rect x="800" y="275" width="400" height="5" fill="#22d3ee"/>
  </g>
</svg>
